server {
    listen 80;
    server_name tablo.dev.localhost;
    return 301 https://tablo.dev.localhost;
}

server {
    listen 443 ssl;
    ssl_certificate     /ssl/certs/star.dev.localhost.crt;
    ssl_certificate_key /ssl/keys/star.dev.localhost.key;
    server_name tablo.dev.localhost;
    location / {
        set $server "tablo-web";
        proxy_pass http://$server:3400;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
